name: Update Data

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fix quellen separators
        working-directory: scripts
        run: python fix_quellen.py ../data/clusters

      - name: Build data.js
        working-directory: scripts
        run: python build.py

      - name: Inject cache-busting timestamp
        run: |
          TS=$(date +%s)
          sed -i "s|data/data.js?v=__TIMESTAMP__|data/data.js?v=$TS|g" index.html

      - name: Upload site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4