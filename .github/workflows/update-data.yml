name: Update Data

on:
  push:
    paths:
      - 'data/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fix quellen separators
        working-directory: scripts
        run: python fix_quellen.py ../data/clusters

      - name: Build data.js
        working-directory: scripts
        run: python build.py

      - name: Commit and push updated data.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.js
          git diff --cached --quiet || git commit -m "chore: rebuild data.js [skip ci]"
          git push
