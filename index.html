<!DOCTYPE html>
<html lang="de">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovation Map Österreich – EXPO 2027 Belgrad</title>
<script src="data/data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --surface:   rgba(10,14,26,0.82);
  --surface2:  rgba(15,20,38,0.9);
  --border:    rgba(255,255,255,0.09);
  --border-md: rgba(255,255,255,0.16);
  --text-1:    #edf2ff;
  --text-2:    #adbcd1;
  --text-3:    #edf2ff;
  --red-at:    #c8212a;
  --r:         10px;
  --rl:        16px;
}
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Sora',sans-serif;
  color:var(--text-1);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:
    linear-gradient(to bottom, rgba(5,8,20,.72) 0%, rgba(5,8,20,.52) 40%, rgba(5,8,20,.78) 100%),
    url('https://serbia.com/wp-content/uploads/2024/09/expo-2027-naslovna1-e1727095702320-1346x500.jpg')
    center/cover fixed no-repeat;
  font-size:16px;
}

.stripe{height:3px;background:linear-gradient(90deg,var(--red-at) 33.3%,#fff 33.3% 66.6%,var(--red-at) 66.6%);flex-shrink:0;}

/* ── HEADER ── */
header{
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  background:rgba(5,8,20,.55);border-bottom:1px solid var(--border);
  z-index:110;flex-shrink:0;
}
.hdr{
  width:100%;padding:.75rem 1rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.hdr-left{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.hdr-eyebrow{font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-bottom:3px}
.hdr-title{font-family:'DM Serif Display',serif;font-size:20px;line-height:1;color:var(--text-1)}
.hdr-div{width:1px;height:36px;background:var(--border);display:none;}
.hdr-kpis{display:flex;gap:1.5rem}
.kpi-n{font-size:18px;font-weight:700;letter-spacing:-.04em;line-height:1;color:var(--text-1)}
.kpi-l{font-size:9px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);margin-top:3px}
.expo-badge{font-size:11px;font-weight:600;color:rgba(255,255,255,.8);background:rgba(255,255,255,.06);border:1px solid var(--border);padding:6px 12px;border-radius:20px;white-space:nowrap}

/* ── CLUSTER NAV ── */
.c-nav{
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  background:rgba(5,8,20,0.7);border-bottom:1px solid var(--border);
  overflow-x:auto;overflow-y:hidden;flex-shrink:0;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.c-nav::-webkit-scrollbar{display:none;}
.c-nav-label{display:none;}
.c-nav-inner{
  display:flex;gap:8px;padding:.6rem 1rem;
  width:max-content;
  pointer-events:auto;opacity:1;
}
.c-btn{
  display:flex;align-items:center;gap:6px;padding:7px 13px;
  border-radius:7px;border:1px solid var(--border);background:transparent;
  color:var(--text-2);font-family:'Sora',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;
}
.c-btn.on{color:#fff;border-color:transparent}
.c-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.c-count{font-size:10px;background:rgba(255,255,255,.12);padding:2px 7px;border-radius:20px;margin-left:2px}

/* ── MAIN LAYOUT ── */
.page{
  width:100%;
  padding:1rem;
  display:flex;
  flex-direction:column;
  gap:1rem;
  flex:1;
}

/* ── PROJECT LIST ── */
.sidebar{
  display:flex;
  flex-direction:column;
  width:100%;
  position:relative;
}
.sidebar-vertical-label{display:none;}
.sidebar-content{display:flex;flex-direction:column;width:100%;}

.grid-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--text-3);margin-bottom:.75rem;opacity:.7;}

.p-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:.75rem;
  width:100%;
}
.p-card{
  background:var(--surface);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:var(--r);
  padding:1rem 1.1rem;cursor:pointer;
  transition:all 0.2s ease;
  animation:fadeUp .3s ease both;
  width:100%;
}
.p-card.on{border-width:1.5px;background:var(--surface2);}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.p-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.7rem}
.p-num{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:.06em}
.p-name{font-size:14px;font-weight:600;color:var(--text-1);line-height:1.4;margin-top:3px}
.p-org{font-size:11px;color:var(--text-2);line-height:1.4;margin-top:3px}

.ring-w{position:relative;width:44px;height:44px;flex-shrink:0}
.ring-w svg{position:absolute;inset:0;width:44px;height:44px;}
.ring-ct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-n{font-size:11px;font-weight:700;line-height:1;color:var(--text-1)}
.ring-s{font-size:6px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-top:2px}

.bars{display:flex;flex-direction:column;gap:5px}
.bar-r{display:flex;align-items:center;gap:8px}
.bar-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);width:28px;flex-shrink:0}
.bar-t{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;transition:width .5s .1s ease}
.bar-v{font-size:10px;font-weight:600;color:var(--text-2);width:14px;text-align:right;flex-shrink:0}

/* ── DETAIL PANEL ── */
.detail-panel{
  width:100%;
  background:var(--surface2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--border-md);border-radius:var(--rl);
  overflow:hidden;
  display:none;
}
.detail-panel.on{display:block;animation:fadeUp .3s ease;}

/* Back button (mobile) */
.d-back{
  display:flex;align-items:center;gap:8px;
  padding:.75rem 1rem;
  font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text-2);background:rgba(5,8,20,.5);border-bottom:1px solid var(--border);
  cursor:pointer;border:none;width:100%;text-align:left;font-family:'Sora',sans-serif;
}
.d-back:active{background:rgba(255,255,255,.05);}

.d-hero{position:relative;height:220px;overflow:hidden}
.d-hero img{width:100%;height:100%;object-fit:cover;display:block}
.d-hero-ov{
  position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(5,8,20,.98) 0%,rgba(5,8,20,.3) 60%,transparent 100%);
}
.d-hero-ct{position:absolute;bottom:1.25rem;left:1.25rem;right:1.25rem}
.d-tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);padding:5px 12px;border-radius:20px;margin-bottom:8px}
.d-title{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;line-height:1.2;margin-bottom:6px}
.d-subtitle{font-size:13px;color:rgba(255,255,255,.7);line-height:1.5;}

.d-body{padding:1.25rem;display:flex;flex-direction:column;gap:1.5rem;}

.d-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.17em;color:var(--text-3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.d-desc{font-size:14px;line-height:1.8;color:#d1dae8;margin-bottom:1.25rem}
.d-zukunft{font-size:13px;line-height:1.75;color:var(--text-1);font-style:italic;padding:1.25rem;border-radius:8px;background:rgba(255,255,255,.04);border-left:4px solid}

.radar-canvas-w{position:relative;height:240px;margin-bottom:1.5rem}

.ladders{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.l-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.l-step{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.l-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.l-lbl{font-size:11px;color:var(--text-2);line-height:1.4}
.l-lbl.on{color:var(--text-1);font-weight:600;font-size:12px;}

.con-role{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:4px 12px;border-radius:20px;margin-bottom:8px;margin-top:12px}
.con-coord{background:rgba(29,158,117,.15);color:#26c995}
.con-part{background:rgba(255,255,255,.08);color:var(--text-2)}
.con-list{list-style:none}
.con-list li{font-size:13px;color:var(--text-2);padding:9px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.con-list li:last-child{border-bottom:none}
.con-list a{color:inherit;text-decoration:none}

.src-item{font-size:12px;padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:baseline}
.src-item a{color:var(--text-2);text-decoration:none;word-break:break-all}

footer{width:100%;padding:1rem;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-3);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;gap:.5rem;}

/* ── TABLET & DESKTOP ── */
@media(min-width:700px){
  body{height:100vh;overflow:hidden;}

  .hdr{padding:1rem 1.5rem;}
  .hdr-title{font-size:26px;}
  .hdr-div{display:block;}
  .kpi-n{font-size:22px;}
  .kpi-l{font-size:10px;}

  .c-nav{
    background:rgba(5,8,20,0.8);
    overflow:visible;
    display:flex;align-items:center;justify-content:center;
  }
  .c-nav-inner{opacity:1;padding:.75rem 1.5rem;pointer-events:auto;width:auto;}
  .c-nav-label{display:none;}

  .page{
    flex-direction:row;
    padding:1.5rem;
    gap:1.5rem;
    flex:1;
    overflow:hidden;
  }

  .sidebar{
    width:25%;min-width:320px;max-width:400px;
  }
  .sidebar-content{
    height:100%;opacity:1;overflow:hidden;
  }
  .sidebar-vertical-label{display:none;}

  .p-grid{
    display:flex;flex-direction:column;
    overflow-y:auto;padding-right:10px;
    scrollbar-width:thin;scrollbar-color:var(--border-md) transparent;
    flex:1;
  }
  .p-grid::-webkit-scrollbar{width:5px;}
  .p-grid::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:10px;}
  .p-card:hover{background:var(--surface2);border-color:var(--border-md);transform:translateX(6px);}

  .detail-panel{
    flex:1;overflow-y:auto;overflow-x:hidden;
  }
  .d-back{display:none;}
  .d-hero{height:380px;}
  .d-hero-ct{bottom:2rem;left:2.5rem;right:2.5rem;}
  .d-hero-ov{
    background:linear-gradient(100deg,rgba(5,8,20,.9) 0%,rgba(5,8,20,.2) 65%),
               linear-gradient(0deg,rgba(5,8,20,.98) 0%,transparent 42%);
  }
  .d-tag{font-size:11px;}
  .d-title{font-size:34px;}
  .d-subtitle{font-size:16px;}
  .d-body{padding:2rem 2.5rem;display:grid;grid-template-columns:1fr 300px 260px;gap:3rem;flex-direction:unset;}
  .d-desc{font-size:15px;}
  .radar-canvas-w{height:260px;}
}

@media(min-width:1100px){
  .hdr-title{font-size:28px;}
  .d-hero{height:460px;}
  .d-hero-ct{bottom:2.5rem;left:3rem;right:3rem;}
  .d-title{font-size:42px;}
  .d-subtitle{font-size:18px;}
  .d-body{padding:2.5rem 3rem;grid-template-columns:1fr 320px 280px;gap:4rem;}
}
</style>
</head>
<body>

<div class="stripe"></div>

<header>
  <div class="hdr">
    <div class="hdr-left">
      <div>
        <div class="hdr-eyebrow">Österreichische Innovationslandschaft</div>
        <div class="hdr-title">Innovation Map Österreich</div>
      </div>
      <div class="hdr-div"></div>
      <div class="hdr-kpis">
        <div><div class="kpi-n" id="kpiC">—</div><div class="kpi-l">Cluster</div></div>
        <div><div class="kpi-n" id="kpiP">—</div><div class="kpi-l">Projekte Gesamt</div></div>
      </div>
    </div>
    <div class="expo-badge">EXPO 2027 · Belgrad</div>
  </div>
</header>

<nav class="c-nav">
  <div class="c-nav-label">Cluster</div>
  <div class="c-nav-inner" id="cNav"></div>
</nav>

<div class="page">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-vertical-label">Projekte</div>
    <div class="sidebar-content">
        <div class="grid-label" id="gLabel">Projekte</div>
        <div class="p-grid" id="projList"></div>
    </div>
  </div>
  <div class="detail-panel" id="detail"></div>
</div>

<footer>
    <span>Innovation Map Österreich | Expo 2027 Edition</span>
    <span>© 2026 Austria at Expo</span>
</footer>

<script>
const clusters=window.INNOVATION_DATA||[];
const AXES=['TRL','SRL','Skalierbarkeit','Nachhaltigkeit','Kooperationen'];
const AXES_IDX=[0,1,3,4,5]; // indices into p.axes, skipping Marktreife (2)
const TRL_L=['Grundprinzipien','Technologiekonzept','Experimentell','Laborvalidierung','Rel. Umgebung','Demo rel. Umg.','Prototyp operativ','Qualifiziert','Marktreif'];
const SRL_L=['Soz. Aspekte','Akteursanalyse','Stakeholder-Einb.','Partizipation','Gesellsch. inform.','Ko-Gestaltung','Integration pilot.','Breit. Akzeptanz','Gesellsch. Einbett.'];
let chart=null,activeCi=0,activePi=-1;
const $=id=>document.getElementById(id);

function hexRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function trlCol(v){return v<=3?'#D85A30':v<=6?'#BA7517':'#1D9E75'}
function srlCol(v){return v<=3?'#D85A30':v<=6?'#534AB7':'#1D9E75'}
function linkify(obj){if(!obj)return'';const n=typeof obj==='object'?obj.name:obj,u=typeof obj==='object'?obj.url:'';return u?`<a href="${u}" target="_blank" rel="noopener">${n}</a>`:n;}

(function(){
  let tp=0;
  clusters.forEach(c=> tp+=c.projects.length);
  $('kpiC').textContent=clusters.length;
  $('kpiP').textContent=tp;
})();

clusters.forEach((c,i)=>{
  const b=document.createElement('button');
  b.className='c-btn'+(i===0?' on':'');
  b.innerHTML=`<div class="c-dot" style="background:${c.color}"></div>${c.name}<span class="c-count">${c.projects.length}</span>`;
  if(i===0){b.style.background=hexRgba(c.color,.15);b.style.borderColor=hexRgba(c.color,.4);b.style.color='#fff';}
  b.onclick=()=>pickCluster(i);
  $('cNav').appendChild(b);
});

function pickCluster(i){
  activeCi=i; activePi=-1;
  const c=clusters[i];
  c.projects.sort((a, b) => ((b.trl + b.srl) / 2) - ((a.trl + a.srl) / 2));
  document.querySelectorAll('.c-btn').forEach((b,j)=>{
    b.classList.toggle('on',j===i);
    b.style.background=j===i?hexRgba(c.color,.15):'';
    b.style.borderColor=j===i?hexRgba(c.color,.4):'';
    b.style.color=j===i?'#fff':'';
  });
  closeDetail();
  renderProjects(i);
  if(c.projects.length > 0) pickProject(i, 0);
}

function closeDetail(){const d=$('detail');d.classList.remove('on');d.innerHTML='';if(chart){chart.destroy();chart=null;}}

function buildRadar(canvasId,p,color){
  if(chart){chart.destroy();chart=null;}
  chart=new Chart($(canvasId),{
    type:'radar',
    data:{labels:AXES,datasets:[{data:AXES_IDX.map(i=>p.axes[i]),backgroundColor:hexRgba(color,.1),borderColor:color,borderWidth:2,pointBackgroundColor:color,pointRadius:4,pointHoverRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.raw+'/9'},backgroundColor:'rgba(10,14,26,.95)',titleColor:'#edf2ff',bodyColor:'#8090aa',borderColor:'rgba(255,255,255,.1)',borderWidth:1,padding:10,displayColors:false}},
      scales:{r:{min:0,max:9,ticks:{stepSize:3,color:'rgba(255,255,255,.18)',font:{size:9,family:'Sora'},backdropColor:'transparent'},grid:{color:'rgba(255,255,255,.07)'},angleLines:{color:'rgba(255,255,255,.07)'},pointLabels:{color:'rgba(255,255,255,.4)',font:{size:11,family:'Sora'}}}}}
  });
}

function ladder(val,labels,colFn){
  return labels.map((lbl,i)=>{const n=i+1,active=n===val,col=colFn(n),bg=active?col:'rgba(255,255,255,.07)';return`<div class="l-step"><div class="l-dot" style="background:${bg}">${n}</div><span class="l-lbl${active?' on':''}">${lbl}</span></div>`;}).join('');
}

function pickProject(ci,pi){
  if(activePi===pi && activeCi===ci && $('detail').classList.contains('on')) return;
  activeCi=ci; activePi=pi;
  const c=clusters[ci],p=c.projects[pi];
  const cards = document.querySelectorAll('.p-card');
  cards.forEach((el,j)=>{
    const isSel = j===pi;
    el.classList.toggle('on', isSel);
    el.style.borderColor = isSel ? c.color : '';
    el.style.boxShadow = isSel ? `0 0 0 1px ${c.color}, 0 8px 32px rgba(0,0,0,.4)` : '';
  });
  const d=$('detail');
  const heroHtml=p.image_url?`<img src="${p.image_url}" alt="${p.name}">`:`<div class="d-hero-ph">Kein Bild verfügbar</div>`;
  let conHtml='';
  if(p.coordinator)conHtml+=`<span class="con-role con-coord">Koordinator</span><ul class="con-list"><li>${linkify(p.coordinator)}</li></ul>`;
  if(p.partners&&p.partners.length)conHtml+=`<span class="con-role con-part">Partner</span><ul class="con-list">${p.partners.map(pt=>`<li>${linkify(pt)}</li>`).join('')}</ul>`;
  const srcHtml=(p.quellen||[]).map(q=>q.url?`<div class="src-item"><a href="${q.url}" target="_blank">${q.label}</a></div>`:`<div class="src-item"><span>${q.label}</span></div>`).join('');
  const descHtml=(p.beschreibung||'').split('\n\n').map(t=>`<p class="d-desc">${t}</p>`).join('');
  d.innerHTML=`
    <button class="d-back" onclick="closeDetail();document.getElementById('projList').scrollIntoView({behavior:'smooth'})">&#8592; Zurück zur Liste</button>
    <div class="d-hero">${heroHtml}<div class="d-hero-ov"></div>
      <div class="d-hero-ct">
        <div class="d-tag"><div style="width:5px;height:5px;border-radius:50%;background:${c.color}"></div>${c.name}</div>
        <div class="d-title">${p.name}</div>
        ${p.subtitle?`<div class="d-subtitle">${p.subtitle}</div>`:''}
      </div>
    </div>
    <div class="d-body">
      <div>
        ${descHtml?`<div class="d-lbl">Projektbeschreibung</div>${descHtml}`:''}
        ${p.zukunft?`<div class="d-lbl" style="margin-top:1.4rem">Zukunftsperspektiven</div><p class="d-zukunft" style="border-left-color:${c.color}">${p.zukunft}</p>`:''}
        ${srcHtml?`<div class="d-lbl" style="margin-top:1.4rem">Quellen</div>${srcHtml}`:''}
      </div>
      <div>
        <div class="d-lbl">Bewertungsprofil</div>
        <div class="radar-canvas-w"><canvas id="radarChart"></canvas></div>
        <div class="d-lbl">Bereitschaftsgrade</div>
        <div class="ladders">
          <div><div class="l-title" style="color:${trlCol(p.trl)}">TRL ${p.trl}/9</div>${ladder(p.trl,TRL_L,trlCol)}</div>
          <div><div class="l-title" style="color:${srlCol(p.srl)}">SRL ${p.srl}/9</div>${ladder(p.srl,SRL_L,srlCol)}</div>
        </div>
      </div>
      <div>${conHtml?`<div class="d-lbl">Konsortium</div>${conHtml}`:''}</div>
    </div>`;
  d.classList.add('on');
  d.scrollTop = 0;
  requestAnimationFrame(() => buildRadar('radarChart', p, c.color));
  // On mobile, scroll detail panel into view
  if(window.innerWidth < 700) {
    setTimeout(() => d.scrollIntoView({behavior:'smooth', block:'start'}), 50);
  }
}

function renderProjects(i){
  const c=clusters[i];
  $('gLabel').textContent=`${c.projects.length} Projekte · ${c.name}`;
  const R=20,CIRC=2*Math.PI*R;
  $('projList').innerHTML=c.projects.map((p,j)=>{
    const avg=(p.trl+p.srl)/2,off=CIRC-(avg/9)*CIRC,col=trlCol(p.trl);
    return`<div class="p-card" onclick="pickProject(${i},${j})" style="animation-delay:${j*.03}s">
      <div class="p-top">
        <div>
          <div class="p-num">№ ${String(j+1).padStart(2,'0')}</div>
          <div class="p-name">${p.name}</div>
          <div class="p-org">${p.org}</div>
        </div>
        <div class="ring-w">
          <svg width="48" height="48"><circle cx="24" cy="24" r="${R}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/><circle cx="24" cy="24" r="${R}" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${CIRC}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 24 24)"/></svg>
          <div class="ring-ct"><div class="ring-n">${avg.toFixed(1)}</div><div class="ring-s">Ø RL</div></div>
        </div>
      </div>
      <div class="bars">
        <div class="bar-r"><div class="bar-l">TRL</div><div class="bar-t"><div class="bar-f" style="width:${p.trl/9*100}%;background:${trlCol(p.trl)}"></div></div><div class="bar-v">${p.trl}</div></div>
        <div class="bar-r"><div class="bar-l">SRL</div><div class="bar-t"><div class="bar-f" style="width:${p.srl/9*100}%;background:${srlCol(p.srl)}"></div></div><div class="bar-v">${p.srl}</div></div>
      </div>
    </div>`;
  }).join('');
}
if(clusters.length) pickCluster(0);
</script>
</body>
