<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovation Map Österreich – EXPO 2027 Belgrad</title>
<script src="data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --surface:   rgba(10,14,26,0.82);
  --surface2:  rgba(15,20,38,0.9);
  --border:    rgba(255,255,255,0.09);
  --border-md: rgba(255,255,255,0.16);
  --text-1:    #edf2ff;
  --text-2:    #adbcd1;
  --text-3:    #edf2ff;
  --red-at:    #c8212a;
  --r:         10px;
  --rl:        16px;
}
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Sora',sans-serif;
  color:var(--text-1);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background:
    linear-gradient(to bottom, rgba(5,8,20,.72) 0%, rgba(5,8,20,.52) 40%, rgba(5,8,20,.78) 100%),
    url('https://serbia.com/wp-content/uploads/2024/09/expo-2027-naslovna1-e1727095702320-1346x500.jpg')
    center/cover fixed no-repeat;
  font-size: 16px;
}

.stripe{height:3px;background:linear-gradient(90deg,var(--red-at) 33.3%,#fff 33.3% 66.6%,var(--red-at) 66.6%); flex-shrink: 0;}

header{
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  background:rgba(5,8,20,.55);border-bottom:1px solid var(--border);
  z-index:110; flex-shrink: 0;
}
.hdr{
  width: 100%; padding:1rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:2rem;
}
.hdr-left{display:flex;align-items:center;gap:1.5rem}
.hdr-eyebrow{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-bottom:4px}
.hdr-title{font-family:'DM Serif Display',serif;font-size:28px;line-height:1;color:var(--text-1)}
.hdr-div{width:1px;height:40px;background:var(--border)}
.hdr-kpis{display:flex;gap:2.5rem}
.kpi-n{font-size:22px;font-weight:700;letter-spacing:-.04em;line-height:1;color:var(--text-1)}
.kpi-l{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--text-3);margin-top:4px}
.expo-badge{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);background:rgba(255,255,255,.06);border:1px solid var(--border);padding:8px 18px;border-radius:20px;white-space:nowrap}

/* CLUSTER NAV HOVER LOGIC */
.c-nav{
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  background:rgba(5,8,20,0.4); border-bottom:1px solid var(--border);
  overflow:hidden; flex-shrink: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  height: 28px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.c-nav:hover { height: 62px; background: rgba(5,8,20,0.8); }

.c-nav-inner { 
  display: flex; gap: 10px; padding: 0.75rem 1.5rem; opacity: 0; 
  transition: opacity 0.3s; pointer-events: none; 
}
.c-nav:hover .c-nav-inner { opacity: 1; pointer-events: auto; }

.c-nav-label {
  position: absolute; font-size: 9px; font-weight: 800; letter-spacing: 0.4em;
  color: var(--text-3); text-transform: uppercase; transition: opacity 0.3s;
}
.c-nav:hover .c-nav-label { opacity: 0; }

.c-btn{
  display:flex;align-items:center;gap:8px;padding:8px 16px;
  border-radius:7px;border:1px solid var(--border);background:transparent;
  color:var(--text-2);font-family:'Sora',sans-serif;font-size:10px;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;
}
.c-btn:hover{background:rgba(255,255,255,.05);border-color:var(--border-md);color:var(--text-1)}
.c-btn.on{color:#fff;border-color:transparent}
.c-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.c-count{font-size:11px;background:rgba(255,255,255,.12);padding:2px 8px;border-radius:20px;margin-left:2px}

.page{
  width: 100%; 
  padding: 1.5rem;
  display: flex;
  gap: 1.5rem;
  flex: 1; 
  overflow: hidden;
}

/* SIDEBAR HOVER LOGIC */
.sidebar {
  display: flex;
  flex-direction: column;
  width: 25%; min-width: 320px; max-width: 400px;
  flex-shrink: 0; position: relative;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
/* Collapsed State */
.sidebar:not(:hover) {
  width: 40px; min-width: 40px; background: rgba(5,8,20,0.3);
  border-radius: var(--r); border: 1px solid var(--border);
  cursor: pointer;
}

.sidebar-content {
  display: flex; flex-direction: column; height: 100%; width: 100%;
  opacity: 1; transition: opacity 0.3s; overflow: hidden;
}
.sidebar:not(:hover) .sidebar-content { opacity: 0; pointer-events: none; }

.sidebar-vertical-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-90deg);
  white-space: nowrap; font-size: 11px; font-weight: 800; letter-spacing: 0.5em;
  color: var(--text-3); text-transform: uppercase; pointer-events: none;
  transition: opacity 0.3s; opacity: 0;
}
.sidebar:not(:hover) .sidebar-vertical-label { opacity: 0.6; }

.grid-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--text-3);margin-bottom:1rem;opacity: 0.7;}

.p-grid{
  display: flex;
  flex-direction: column;
  gap: 1rem;
  overflow-y: auto;
  padding-right: 10px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-md) transparent;
  flex: 1;
}
.p-grid::-webkit-scrollbar { width: 5px; }
.p-grid::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 10px; }

.p-card{
  background:var(--surface);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:var(--r);
  padding:1.1rem 1.25rem;cursor:pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  animation:fadeUp .3s ease both;
  width: 100%;
}
.p-card:hover{ background:var(--surface2); border-color:var(--border-md); transform:translateX(6px); }
.p-card.on{ border-width: 1.5px; opacity: 1; background: var(--surface2); }

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.p-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.8rem}
.p-num{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:.06em}
.p-name{font-size:14px;font-weight:600;color:var(--text-1);line-height:1.4;margin-top:4px}
.p-org{font-size:11px;color:var(--text-2);line-height:1.4;margin-top:4px}

.ring-w{position:relative;width:48px;height:48px;flex-shrink:0}
.ring-w svg{position:absolute;inset:0; width: 48px; height: 48px;}
.ring-ct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-n{font-size:12px;font-weight:700;line-height:1;color:var(--text-1)}
.ring-s{font-size:7px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-top:2px}

.bars{display:flex;flex-direction:column;gap:5px}
.bar-r{display:flex;align-items:center;gap:10px}
.bar-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);width:30px;flex-shrink:0}
.bar-t{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;transition:width .5s .1s ease}
.bar-v{font-size:10px;font-weight:600;color:var(--text-2);width:15px;text-align:right;flex-shrink:0}

.detail-panel{
  flex: 1;
  background:var(--surface2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--border-md);border-radius:var(--rl);
  overflow-y:auto; overflow-x: hidden;
  display:none;
}
.detail-panel.on{display:block; animation:fadeDetail .4s ease;}

.d-hero{position:relative;height:480px;overflow:hidden}
.d-hero img{width:100%;height:100%;object-fit:cover;display:block}
.d-hero-ov{
  position:absolute;inset:0;
  background:linear-gradient(100deg,rgba(5,8,20,.9) 0%,rgba(5,8,20,.2) 65%),
             linear-gradient(0deg,rgba(5,8,20,.98) 0%,transparent 42%);
}
.d-hero-ct{position:absolute;bottom:2.5rem;left:3rem;right:3rem}
.d-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);padding:6px 16px;border-radius:20px;margin-bottom:12px}
.d-title{font-family:'DM Serif Display',serif;font-size:42px;color:#fff;line-height:1.1;margin-bottom:10px}
.d-subtitle{font-size:18px;color:rgba(255,255,255,.7);max-width: 900px;line-height:1.5;}

.d-body{padding:2.5rem 3rem;display:grid;grid-template-columns:1fr 320px 280px;gap:4rem}

.d-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.17em;color:var(--text-3);margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.d-desc{font-size:16px;line-height:1.8;color:#d1dae8;margin-bottom:1.5rem}
.d-zukunft{font-size:15px;line-height:1.75;color:var(--text-1);font-style:italic;padding:1.5rem;border-radius:8px;background:rgba(255,255,255,.04);border-left:5px solid}

.radar-canvas-w{position:relative;height:280px;margin-bottom:2rem}

.ladders{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.l-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.l-step{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.l-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.l-lbl{font-size:12px;color:var(--text-2);line-height:1.4}
.l-lbl.on{color:var(--text-1);font-weight:600; font-size: 13px;}

.con-role{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:4px 12px;border-radius:20px;margin-bottom:10px;margin-top:15px}
.con-coord{background:rgba(29,158,117,.15);color:#26c995}
.con-part{background:rgba(255,255,255,.08);color:var(--text-2)}
.con-list{list-style:none}
.con-list li{font-size:14px;color:var(--text-2);padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.con-list li:last-child{border-bottom:none}
.con-list a{color:inherit;text-decoration:none}

.src-item{font-size:13px;padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:baseline}
.src-item a{color:var(--text-2);text-decoration:none;word-break:break-all}

footer{width: 100%; padding:1.25rem 1.5rem; display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--text-3); border-top:1px solid var(--border); flex-shrink: 0;}
</style>
</head>
<body>

<div class="stripe"></div>

<header>
  <div class="hdr">
    <div class="hdr-left">
      <div>
        <div class="hdr-eyebrow">Österreichische Innovationslandschaft</div>
        <div class="hdr-title">Innovation Map Österreich</div>
      </div>
      <div class="hdr-div"></div>
      <div class="hdr-kpis">
        <div><div class="kpi-n" id="kpiC">—</div><div class="kpi-l">Cluster</div></div>
        <div><div class="kpi-n" id="kpiP">—</div><div class="kpi-l">Projekte Gesamt</div></div>
      </div>
    </div>
    <div class="expo-badge">EXPO 2027 · Belgrad</div>
  </div>
</header>

<nav class="c-nav">
  <div class="c-nav-label">Cluster</div>
  <div class="c-nav-inner" id="cNav"></div>
</nav>

<div class="page">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-vertical-label">Projekte</div>
    <div class="sidebar-content">
        <div class="grid-label" id="gLabel">Projekte</div>
        <div class="p-grid" id="projList"></div>
    </div>
  </div>
  <div class="detail-panel" id="detail"></div>
</div>

<footer>
    <span>Innovation Map Österreich | Expo 2027 Edition</span>
    <span>© 2026 Austria at Expo</span>
</footer>

<script>
const clusters=window.INNOVATION_DATA||[];
const AXES=['TRL','SRL','Marktreife','Skalierbarkeit','Nachhaltigkeit','Kooperationen'];
const TRL_L=['Grundprinzipien','Technologiekonzept','Experimentell','Laborvalidierung','Rel. Umgebung','Demo rel. Umg.','Prototyp operativ','Qualifiziert','Marktreif'];
const SRL_L=['Soz. Aspekte','Akteursanalyse','Stakeholder-Einb.','Partizipation','Gesellsch. inform.','Ko-Gestaltung','Integration pilot.','Breit. Akzeptanz','Gesellsch. Einbett.'];
let chart=null,activeCi=0,activePi=-1;
const $=id=>document.getElementById(id);

function hexRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function trlCol(v){return v<=3?'#D85A30':v<=6?'#BA7517':'#1D9E75'}
function srlCol(v){return v<=3?'#D85A30':v<=6?'#534AB7':'#1D9E75'}
function linkify(obj){if(!obj)return'';const n=typeof obj==='object'?obj.name:obj,u=typeof obj==='object'?obj.url:'';return u?`<a href="${u}" target="_blank" rel="noopener">${n}</a>`:n;}

(function(){
  let tp=0;
  clusters.forEach(c=> tp+=c.projects.length);
  $('kpiC').textContent=clusters.length;
  $('kpiP').textContent=tp;
})();

clusters.forEach((c,i)=>{
  const b=document.createElement('button');
  b.className='c-btn'+(i===0?' on':'');
  b.innerHTML=`<div class="c-dot" style="background:${c.color}"></div>${c.name}<span class="c-count">${c.projects.length}</span>`;
  if(i===0){b.style.background=hexRgba(c.color,.15);b.style.borderColor=hexRgba(c.color,.4);b.style.color='#fff';}
  b.onclick=()=>pickCluster(i);
  $('cNav').appendChild(b);
});

function pickCluster(i){
  activeCi=i; activePi=-1;
  const c=clusters[i];
  c.projects.sort((a, b) => ((b.trl + b.srl) / 2) - ((a.trl + a.srl) / 2));
  document.querySelectorAll('.c-btn').forEach((b,j)=>{
    b.classList.toggle('on',j===i);
    b.style.background=j===i?hexRgba(c.color,.15):'';
    b.style.borderColor=j===i?hexRgba(c.color,.4):'';
    b.style.color=j===i?'#fff':'';
  });
  closeDetail();
  renderProjects(i);
  if(c.projects.length > 0) pickProject(i, 0);
}

function closeDetail(){const d=$('detail');d.classList.remove('on');d.innerHTML='';if(chart){chart.destroy();chart=null;}}

function buildRadar(canvasId,p,color){
  if(chart){chart.destroy();chart=null;}
  chart=new Chart($(canvasId),{
    type:'radar',
    data:{labels:AXES,datasets:[{data:p.axes,backgroundColor:hexRgba(color,.1),borderColor:color,borderWidth:2,pointBackgroundColor:color,pointRadius:4,pointHoverRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.raw+'/9'},backgroundColor:'rgba(10,14,26,.95)',titleColor:'#edf2ff',bodyColor:'#8090aa',borderColor:'rgba(255,255,255,.1)',borderWidth:1,padding:10,displayColors:false}},
      scales:{r:{min:0,max:9,ticks:{stepSize:3,color:'rgba(255,255,255,.18)',font:{size:9,family:'Sora'},backdropColor:'transparent'},grid:{color:'rgba(255,255,255,.07)'},angleLines:{color:'rgba(255,255,255,.07)'},pointLabels:{color:'rgba(255,255,255,.4)',font:{size:11,family:'Sora'}}}}}
  });
}

function ladder(val,labels,colFn){
  return labels.map((lbl,i)=>{const n=i+1,active=n===val,col=colFn(n),bg=active?col:'rgba(255,255,255,.07)';return`<div class="l-step"><div class="l-dot" style="background:${bg}">${n}</div><span class="l-lbl${active?' on':''}">${lbl}</span></div>`;}).join('');
}

function pickProject(ci,pi){
  if(activePi===pi && activeCi===ci && $('detail').classList.contains('on')) return;
  activeCi=ci; activePi=pi;
  const c=clusters[ci],p=c.projects[pi];
  const cards = document.querySelectorAll('.p-card');
  cards.forEach((el,j)=>{
    const isSel = j===pi;
    el.classList.toggle('on', isSel);
    el.style.borderColor = isSel ? c.color : '';
    el.style.boxShadow = isSel ? `0 0 0 1px ${c.color}, 0 8px 32px rgba(0,0,0,.4)` : '';
  });
  const d=$('detail');
  const heroHtml=p.image_url?`<img src="${p.image_url}" alt="${p.name}">`:`<div class="d-hero-ph">Kein Bild verfügbar</div>`;
  let conHtml='';
  if(p.coordinator)conHtml+=`<span class="con-role con-coord">Koordinator</span><ul class="con-list"><li>${linkify(p.coordinator)}</li></ul>`;
  if(p.partners&&p.partners.length)conHtml+=`<span class="con-role con-part">Partner</span><ul class="con-list">${p.partners.map(pt=>`<li>${linkify(pt)}</li>`).join('')}</ul>`;
  const srcHtml=(p.quellen||[]).map(q=>q.url?`<div class="src-item"><a href="${q.url}" target="_blank">${q.label}</a></div>`:`<div class="src-item"><span>${q.label}</span></div>`).join('');
  const descHtml=(p.beschreibung||'').split('\n\n').map(t=>`<p class="d-desc">${t}</p>`).join('');
  d.innerHTML=`
    <div class="d-hero">${heroHtml}<div class="d-hero-ov"></div>
      <div class="d-hero-ct">
        <div class="d-tag"><div style="width:5px;height:5px;border-radius:50%;background:${c.color}"></div>${c.name}</div>
        <div class="d-title">${p.name}</div>
        ${p.subtitle?`<div class="d-subtitle">${p.subtitle}</div>`:''}
      </div>
    </div>
    <div class="d-body">
      <div>
        ${descHtml?`<div class="d-lbl">Projektbeschreibung</div>${descHtml}`:''}
        ${p.zukunft?`<div class="d-lbl" style="margin-top:1.4rem">Zukunftsperspektiven</div><p class="d-zukunft" style="border-left-color:${c.color}">${p.zukunft}</p>`:''}
        ${srcHtml?`<div class="d-lbl" style="margin-top:1.4rem">Quellen</div>${srcHtml}`:''}
      </div>
      <div>
        <div class="d-lbl">Bewertungsprofil</div>
        <div class="radar-canvas-w"><canvas id="radarChart"></canvas></div>
        <div class="d-lbl">Bereitschaftsgrade</div>
        <div class="ladders">
          <div><div class="l-title" style="color:${trlCol(p.trl)}">TRL ${p.trl}/9</div>${ladder(p.trl,TRL_L,trlCol)}</div>
          <div><div class="l-title" style="color:${srlCol(p.srl)}">SRL ${p.srl}/9</div>${ladder(p.srl,SRL_L,srlCol)}</div>
        </div>
      </div>
      <div>${conHtml?`<div class="d-lbl">Konsortium</div>${conHtml}`:''}</div>
    </div>`;
  d.classList.add('on');
  d.scrollTop = 0;
  requestAnimationFrame(() => buildRadar('radarChart', p, c.color));
}

function renderProjects(i){
  const c=clusters[i];
  $('gLabel').textContent=`${c.projects.length} Projekte · ${c.name}`;
  const R=20,CIRC=2*Math.PI*R;
  $('projList').innerHTML=c.projects.map((p,j)=>{
    const avg=(p.trl+p.srl)/2,off=CIRC-(avg/9)*CIRC,col=trlCol(p.trl);
    return`<div class="p-card" onclick="pickProject(${i},${j})" style="animation-delay:${j*.03}s">
      <div class="p-top">
        <div>
          <div class="p-num">№ ${String(j+1).padStart(2,'0')}</div>
          <div class="p-name">${p.name}</div>
          <div class="p-org">${p.org}</div>
        </div>
        <div class="ring-w">
          <svg width="48" height="48"><circle cx="24" cy="24" r="${R}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/><circle cx="24" cy="24" r="${R}" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${CIRC}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 24 24)"/></svg>
          <div class="ring-ct"><div class="ring-n">${avg.toFixed(1)}</div><div class="ring-s">Ø RL</div></div>
        </div>
      </div>
      <div class="bars">
        <div class="bar-r"><div class="bar-l">TRL</div><div class="bar-t"><div class="bar-f" style="width:${p.trl/9*100}%;background:${trlCol(p.trl)}"></div></div><div class="bar-v">${p.trl}</div></div>
        <div class="bar-r"><div class="bar-l">SRL</div><div class="bar-t"><div class="bar-f" style="width:${p.srl/9*100}%;background:${srlCol(p.srl)}"></div></div><div class="bar-v">${p.srl}</div></div>
      </div>
    </div>`;
  }).join('');
}
if(clusters.length) pickCluster(0);
</script>
</body>
</html>
